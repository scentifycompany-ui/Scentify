<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scentify — Find Your Signature Scent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://js.stripe.com/v3/">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f6f2;
  --bg2:#ffffff;
  --ink:#1a1714;
  --ink2:#4a4540;
  --muted:#8a8078;
  --border:#e8e2d8;
  --gold:#c9a84c;
  --gold2:#f0d89a;
  --gold-dark:#9a7530;
  --accent:#e8d5a3;
  --glass:rgba(255,255,255,0.7);
  --glass-border:rgba(255,255,255,0.5);
  --shadow:0 8px 32px rgba(26,23,20,0.08);
  --shadow-lg:0 24px 64px rgba(26,23,20,0.12);
  --radius:16px;
  --radius-sm:10px;
  --font-display:'Cormorant Garamond',serif;
  --font-body:'DM Sans',sans-serif;
  --danger:#c0392b;
  --success:#27ae60;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.fade-in{animation:fadeIn .5s ease both}
.fade-in-1{animation:fadeIn .5s .1s ease both}
.fade-in-2{animation:fadeIn .5s .2s ease both}
.fade-in-3{animation:fadeIn .5s .3s ease both}

/* GLASS CARD */
.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:14px;font-weight:500;
  transition:all .2s ease;letter-spacing:.3px;
}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:#2d2a26;transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,23,20,.2)}
.btn-primary:active{transform:translateY(0)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--ink)}
.btn-ghost:hover{background:var(--bg);border-color:var(--ink)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-lg{padding:16px 36px;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:70px;
  background:rgba(248,246,242,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-brand{
  font-family:var(--font-display);
  font-size:28px;font-weight:600;
  color:var(--ink);cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
.nav-brand .dot{color:var(--gold)}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-link{
  font-size:14px;color:var(--ink2);cursor:pointer;
  border:none;background:none;font-family:var(--font-body);
  transition:color .2s;padding:0;letter-spacing:.2px;
}
.nav-link:hover{color:var(--ink)}
.nav-link.active{color:var(--ink);font-weight:500}
.nav-actions{display:flex;align-items:center;gap:16px}
.cart-btn{
  position:relative;background:none;border:none;cursor:pointer;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .2s;
}
.cart-btn:hover{background:var(--border)}
.cart-badge{
  position:absolute;top:4px;right:4px;
  background:var(--gold);color:#fff;
  font-size:10px;font-weight:700;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.search-btn{background:none;border:none;cursor:pointer;padding:8px;color:var(--ink2);border-radius:50%;transition:background .2s}
.search-btn:hover{background:var(--border)}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:120px 40px 80px;
  position:relative;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%, rgba(201,168,76,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 80% 60%, rgba(201,168,76,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 90%, rgba(201,168,76,.05) 0%, transparent 60%);
  pointer-events:none;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--glass);border:1px solid var(--glass-border);
  padding:8px 20px;border-radius:50px;font-size:13px;color:var(--gold-dark);
  margin-bottom:32px;backdrop-filter:blur(10px);
  font-weight:500;letter-spacing:.5px;
}
.hero h1{
  font-family:var(--font-display);
  font-size:clamp(52px,8vw,96px);
  font-weight:300;line-height:1;
  color:var(--ink);margin-bottom:8px;
  letter-spacing:-1px;
}
.hero h1 em{color:var(--gold);font-style:italic}
.hero-tag{
  font-family:var(--font-display);font-style:italic;
  font-size:clamp(20px,3vw,28px);color:var(--muted);
  margin-bottom:40px;font-weight:300;
}
.hero-desc{
  font-size:16px;color:var(--ink2);max-width:520px;
  line-height:1.7;margin-bottom:48px;
}
.hero-stats{
  display:flex;gap:48px;margin-top:64px;
  flex-wrap:wrap;justify-content:center;
}
.hero-stat{text-align:center}
.hero-stat-num{font-family:var(--font-display);font-size:36px;font-weight:600;color:var(--ink)}
.hero-stat-label{font-size:13px;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.hero-scroll{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;
}
.hero-scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--muted),transparent);animation:float 2s ease-in-out infinite}

/* SECTION */
.section{padding:100px 40px;max-width:1400px;margin:0 auto}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px;flex-wrap:wrap;gap:16px}
.section-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark);font-weight:500;margin-bottom:8px}
.section-title{font-family:var(--font-display);font-size:clamp(32px,4vw,48px);font-weight:400;color:var(--ink);line-height:1.1}
.section-title em{color:var(--gold);font-style:italic}

/* SEARCH & FILTERS */
.search-bar-container{
  background:var(--bg2);border:1px solid var(--border);border-radius:50px;
  display:flex;align-items:center;padding:0 20px;gap:12px;
  max-width:480px;width:100%;
  box-shadow:var(--shadow);
}
.search-bar-container input{
  flex:1;border:none;outline:none;font-family:var(--font-body);
  font-size:15px;color:var(--ink);background:transparent;padding:14px 0;
}
.search-bar-container input::placeholder{color:var(--muted)}
.filter-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
.chip{
  padding:8px 20px;border-radius:50px;font-size:13px;font-weight:500;
  cursor:pointer;border:1.5px solid var(--border);background:var(--bg2);
  color:var(--ink2);transition:all .2s;font-family:var(--font-body);
}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.sort-select{
  padding:10px 20px;border-radius:50px;border:1.5px solid var(--border);
  background:var(--bg2);font-family:var(--font-body);font-size:13px;
  color:var(--ink);cursor:pointer;outline:none;
}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px}
.product-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:transform .3s ease,box-shadow .3s ease;
  cursor:pointer;animation:fadeIn .5s ease both;
}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.product-img-wrap{
  position:relative;overflow:hidden;aspect-ratio:4/3;
  background:linear-gradient(135deg,#f5ede0,#ede0c8);
}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.product-card:hover .product-img-wrap img{transform:scale(1.05)}
.product-img-emoji{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:64px;
  background:linear-gradient(135deg,#fdf6ec,#f5e8d0);
}
.product-badges{position:absolute;top:12px;left:12px;display:flex;gap:6px;flex-wrap:wrap}
.badge{
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:50px;
  letter-spacing:.3px;
}
.badge-sample{background:rgba(201,168,76,.15);color:var(--gold-dark);border:1px solid rgba(201,168,76,.3)}
.badge-limited{background:rgba(192,57,43,.1);color:var(--danger);border:1px solid rgba(192,57,43,.2)}
.badge-out{background:rgba(74,69,64,.1);color:var(--ink2);border:1px solid rgba(74,69,64,.2)}
.badge-new{background:rgba(39,174,96,.1);color:var(--success);border:1px solid rgba(39,174,96,.2)}
.badge-bundle{background:rgba(52,152,219,.1);color:#2980b9;border:1px solid rgba(52,152,219,.2)}
.badge-popular{background:rgba(155,89,182,.1);color:#8e44ad;border:1px solid rgba(155,89,182,.2)}
.wishlist-btn{
  position:absolute;top:12px;right:12px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.8);backdrop-filter:blur(8px);
  border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;
}
.wishlist-btn:hover{transform:scale(1.1)}
.product-body{padding:20px}
.product-category{font-size:12px;color:var(--gold-dark);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.product-name{font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--ink);margin-bottom:4px;line-height:1.2}
.product-note{font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic}
.product-desc{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.product-price{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--ink)}
.product-volume{font-size:12px;color:var(--muted);margin-top:2px}
.stock-warn{font-size:12px;color:var(--danger);font-weight:500;margin-top:6px;display:flex;align-items:center;gap:4px}
.qty-selector{display:flex;align-items:center;gap:0;border:1.5px solid var(--border);border-radius:50px;overflow:hidden}
.qty-btn{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;font-size:16px;color:var(--ink2);
  transition:background .2s;
}
.qty-btn:hover{background:var(--bg)}
.qty-num{width:36px;text-align:center;font-size:14px;font-weight:500}
.add-to-cart-btn{
  flex:1;min-width:0;
  background:var(--ink);color:#fff;border:none;
  padding:12px 16px;border-radius:50px;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:var(--font-body);
  white-space:nowrap;
}
.add-to-cart-btn:hover{background:#2d2a26;transform:translateY(-1px)}
.add-to-cart-btn:disabled{background:var(--muted);cursor:not-allowed;transform:none}

/* CART DRAWER */
.cart-overlay{
  position:fixed;inset:0;background:rgba(26,23,20,.4);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;
}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{
  position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;
  background:var(--bg2);z-index:201;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 40px rgba(26,23,20,.12);
}
.cart-drawer.open{transform:translateX(0)}
.cart-header{
  padding:24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-header h3{font-family:var(--font-display);font-size:24px;font-weight:500}
.cart-close{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--muted);transition:all .2s;
}
.cart-close:hover{background:var(--bg);color:var(--ink)}
.cart-items{flex:1;overflow-y:auto;padding:20px 24px}
.cart-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;gap:12px;
}
.cart-empty-icon{font-size:48px;opacity:.3}
.cart-empty-text{color:var(--muted);font-size:14px}
.cart-item{
  display:flex;gap:16px;padding:16px 0;
  border-bottom:1px solid var(--border);
}
.cart-item:last-child{border-bottom:none}
.cart-item-img{
  width:72px;height:72px;border-radius:var(--radius-sm);overflow:hidden;
  background:linear-gradient(135deg,#fdf6ec,#f5e8d0);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-note{font-size:12px;color:var(--muted);margin-bottom:8px;font-style:italic}
.cart-item-footer{display:flex;align-items:center;justify-content:space-between}
.cart-item-price{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--ink)}
.cart-item-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0;transition:color .2s;font-family:var(--font-body)}
.cart-item-remove:hover{color:var(--danger)}
.cart-footer{padding:24px;border-top:1px solid var(--border)}
.cart-subtotal{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cart-subtotal-label{font-size:14px;color:var(--muted)}
.cart-subtotal-value{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--ink)}
.cart-shipping-note{font-size:12px;color:var(--muted);margin-bottom:20px;font-style:italic}
.checkout-btn{
  width:100%;background:var(--ink);color:#fff;border:none;
  padding:16px;border-radius:50px;font-size:15px;font-weight:500;
  cursor:pointer;font-family:var(--font-body);transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.checkout-btn:hover{background:#2d2a26;transform:translateY(-1px);box-shadow:0 8px 24px rgba(26,23,20,.2)}
.checkout-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* BUNDLE BUILDER */
.bundle-section{
  background:linear-gradient(135deg,#1a1714,#2d2a26);
  border-radius:24px;padding:60px;margin:0 auto;max-width:1400px;
  color:#fff;position:relative;overflow:hidden;
}
.bundle-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 60% at 10% 50%, rgba(201,168,76,.15) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 20%, rgba(201,168,76,.08) 0%,transparent 60%);
}
.bundle-title{font-family:var(--font-display);font-size:clamp(32px,4vw,52px);font-weight:300;color:#fff;margin-bottom:8px}
.bundle-title em{color:var(--gold2);font-style:italic}
.bundle-sub{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:40px}
.bundle-types{display:flex;gap:12px;margin-bottom:40px;flex-wrap:wrap}
.bundle-type-btn{
  padding:10px 24px;border-radius:50px;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);
  cursor:pointer;font-family:var(--font-body);font-size:14px;font-weight:500;
  transition:all .2s;
}
.bundle-type-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.bundle-type-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}
.bundle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:32px}
.bundle-scent{
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);
  border-radius:var(--radius-sm);padding:16px;text-align:center;cursor:pointer;
  transition:all .2s;
}
.bundle-scent:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3)}
.bundle-scent.selected{background:rgba(201,168,76,.15);border-color:var(--gold2)}
.bundle-scent.disabled{opacity:.3;cursor:not-allowed}
.bundle-scent-emoji{font-size:28px;margin-bottom:8px}
.bundle-scent-name{font-size:13px;font-weight:500;color:#fff;margin-bottom:2px}
.bundle-scent-note{font-size:11px;color:rgba(255,255,255,.5)}
.bundle-selected{display:flex;gap:8px;flex-wrap:wrap;min-height:40px;margin-bottom:24px}
.bundle-tag{
  background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.3);
  color:var(--gold2);font-size:12px;padding:6px 14px;border-radius:50px;
  display:flex;align-items:center;gap:6px;
}
.bundle-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.bundle-price{font-family:var(--font-display);font-size:36px;font-weight:600;color:var(--gold2)}
.bundle-price-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:2px}
.bundle-add-btn{
  background:var(--gold);color:#fff;border:none;padding:16px 40px;
  border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;
  font-family:var(--font-body);transition:all .2s;
}
.bundle-add-btn:hover{background:var(--gold-dark);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.4)}
.bundle-add-btn:disabled{background:rgba(255,255,255,.1);cursor:not-allowed;transform:none;color:rgba(255,255,255,.3)}
.bundle-progress{
  display:flex;gap:8px;margin-bottom:24px;
}
.bundle-progress-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,.2);transition:background .2s;
}
.bundle-progress-dot.filled{background:var(--gold)}

/* CHECKOUT MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,23,20,.5);
  z-index:300;display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border-radius:24px;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;padding:40px;
  transform:scale(0.95);transition:transform .3s;
  box-shadow:var(--shadow-lg);
}
.modal-overlay.open .modal{transform:scale(1)}
.modal-title{font-family:var(--font-display);font-size:32px;font-weight:400;margin-bottom:8px;color:var(--ink)}

function StorePage({products,onAdd}){
  const [search,setSearch]=useState('');
  const [cat,setCat]=useState('All');
  const [sort,setSort]=useState('default');
  let filtered=products.filter(p=>{
    const matchSearch=p.name.toLowerCase().includes(search.toLowerCase())||p.note.toLowerCase().includes(search.toLowerCase());
    const matchCat=cat==='All'||(cat==='Popular'?p.popular:cat==='New'?p.isNew:p.category===cat);
    return matchSearch&&matchCat;
  });
  if(sort==='price-asc')filtered=[...filtered].sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc')filtered=[...filtered].sort((a,b)=>b.price-a.price);
  else if(sort==='popular')filtered=[...filtered].sort((a,b)=>(b.popular?1:0)-(a.popular?1:0));
  return(
    <>
      <Hero setPage={()=>{document.querySelector('.section')?.scrollIntoView({behavior:'smooth'})}}/>
      <div className="section">
        <div className="section-header">

            <div className="section-title">Fragrance <em>Samples</em></div>

              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input placeholder="Search fragrances..." value={search} onChange={e=>setSearch(e.target.value)}/>
            {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',fontSize:'16px'}}>×</button>}
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px',flexWrap:'wrap',gap:'12px'}}>
          <div className="filter-chips" style={{marginBottom:0}}>
            {CATEGORIES.map(c=>(
              <button key={c} className={`chip ${cat===c?'active':''}`} onClick={()=>setCat(c)}>{c}</button>
            ))}
          </div>
          <select className="sort-select" value={sort} onChange={e=>setSort(e.target.value)}>
            <option value="default">Sort: Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="popular">Most Popular</option>

// BUNDLE BUILDER

function BundlesPage({products,onAdd}){
  const [btype,setBtype]=useState('3pack');
  const [selected,setSelected]=useState([]);
  const config=BUNDLE_CONFIGS[btype];
  const avail=products.filter(p=>p.qty>0);
  const toggle=id=>{
    setSelected(sel=>{
      if(sel.includes(id))return sel.filter(x=>x!==id);
      if(sel.length>=config.count)return sel;
      return [...sel,id];
    });
  };
  const handleAdd=()=>{
    const names=selected.map(id=>{const p=products.find(x=>x.id===id);return p?p.emoji+' '+p.name:''}).join(', ');
    onAdd({id:`bundle-${Date.now()}`,name:`Custom ${config.label}`,note:names,price:config.price,qty:999,emoji:'🎁',desc:'Custom bundle',volume:config.count+'× 2ml',category:'Bundle'},1,selected);
    setSelected([]);
  };
  return(
    <div style={{paddingTop:'90px'}}>
      <div className="section" style={{paddingBottom:'40px'}}>
        <div className="section-label">Bundle Builder</div>
        <div className="section-title" style={{marginBottom:'16px'}}>Build Your <em>Bundle</em></div>
        <p style={{fontSize:'16px',color:'var(--muted)',maxWidth:'520px',lineHeight:'1.7'}}>
          Mix and match your favourite scents into a custom bundle. Pick your size, choose your samples, and save.
        </p>
      </div>
      <div style={{padding:'0 40px 80px',maxWidth:'1400px',margin:'0 auto'}}>
        <div className="bundle-section">
          <div className="bundle-bg"/>
          <div style={{position:'relative'}}>
            <div className="bundle-title">Mix Your <em>Scents</em></div>
            <div className="bundle-sub">Choose a bundle size, then select your samples</div>
            <div className="bundle-types">
              {Object.entries(BUNDLE_CONFIGS).map(([k,v])=>(
                <button key={k} className={`bundle-type-btn ${btype===k?'active':''}`}
                  onClick={()=>{setBtype(k);setSelected([])}}>
                  {v.label} · ${v.price} <span style={{opacity:.6,fontSize:'12px',marginLeft:'4px'}}>{v.save}</span>
                </button>
              ))}
            </div>
            <div style={{marginBottom:'20px'}}>
              <div style={{fontSize:'13px',color:'rgba(255,255,255,.5)',marginBottom:'12px'}}>
                Select {config.count} scents ({selected.length}/{config.count} chosen)
              </div>
              <div className="bundle-progress">
                {Array.from({length:config.count}).map((_,i)=>(
                  <div key={i} className={`bundle-progress-dot ${i<selected.length?'filled':''}`}/>
                ))}
              </div>
            </div>
            <div className="bundle-grid">
              {avail.map(p=>{
                const sel=selected.includes(p.id);
                const dis=!sel&&selected.length>=config.count;
                return(
                  <div key={p.id} className={`bundle-scent ${sel?'selected':''} ${dis?'disabled':''}`}
                    onClick={()=>!dis&&toggle(p.id)}>
                    <div className="bundle-scent-emoji">{p.emoji}</div>
                    <div className="bundle-scent-name">{p.name}</div>
                    <div className="bundle-scent-note">{p.category}</div>
                    {sel&&<div style={{fontSize:'10px',color:'var(--gold2)',marginTop:'4px'}}>✓ Selected</div>}
                  </div>
                )
              })}
            </div>
            {selected.length>0&&(
              <div className="bundle-selected">
                {selected.map(id=>{const p=products.find(x=>x.id===id);return p?(
                  <span key={id} className="bundle-tag">
                    {p.emoji} {p.name}
                    <button onClick={()=>toggle(id)} style={{background:'none',border:'none',color:'inherit',cursor:'pointer',fontSize:'14px',lineHeight:1}}>×</button>
                  </span>
                ):null})}
              </div>

              <div>
                <div className="bundle-price">${config.price.toFixed(2)}</div>

function AIPage({products,onAdd}){
  const [mood,setMood]=useState('');
  const [season,setSeason]=useState('');
  const [loading,setLoading]=useState(false);
  const [recs,setRecs]=useState([]);
  const [aiDesc,setAiDesc]=useState('');
  const moods=['Fresh & Clean','Romantic','Bold & Intense','Cozy & Warm','Citrusy','Mysterious'];
  const seasons=['Spring','Summer','Autumn','Winter','Year-Round'];

  const getRecs=async()=>{
    if(!mood)return;
    setLoading(true);setRecs([]);setAiDesc('');
    try{
      const prompt=`You are a fragrance expert for Scentify, a sample shop. A customer is looking for: Mood: "${mood}"${season?`, Season: "${season}"`:''}. 

Available samples: ${products.map(p=>`${p.name} (${p.category}, ${p.note}, $${p.price})`).join('; ')}.

Give 3 personalized recommendations from the available list. For each, write 1-2 sentences why it matches their vibe. Be warm, knowledgeable, and concise. Format as:
1. [Name] — [reason]
2. [Name] — [reason]  
3. [Name] — [reason]

Then add a brief closing sentence about the overall scent journey.`;

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:500,
          messages:[{role:'user',content:prompt}]
        })
      });
      const data=await res.json();
      const text=data.content?.[0]?.text||'';
      setAiDesc(text);
      // Extract mentioned product names
      const mentioned=products.filter(p=>text.includes(p.name));
      setRecs(mentioned.slice(0,3));
    }catch(e){
      setAiDesc('Unable to load AI recommendations. Please try again.');
    }finally{setLoading(false)}
  };

  return(
    <div style={{paddingTop:'90px'}}>
      <div className="section" style={{paddingBottom:'40px'}}>
        <div className="section-label">AI Fragrance Finder</div>
        <div className="section-title" style={{marginBottom:'16px'}}>Your Personal <em>Scent Guide</em></div>

        <div className="ai-section">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'48px',flexWrap:'wrap'}}>
            <div>
              <div className="ai-title">What's your <em>mood?</em></div>
              <div className="ai-desc">Pick a vibe and season. Our AI will find your perfect match from our current samples.</div>
              <div style={{marginBottom:'24px'}}>
                <div style={{fontSize:'13px',fontWeight:'500',marginBottom:'12px',color:'var(--muted)',letterSpacing:'.5px',textTransform:'uppercase'}}>Mood</div>
                <div className="ai-moods">
                  {moods.map(m=>(
                    <button key={m} className={`mood-btn ${mood===m?'active':''}`} onClick={()=>setMood(m)}>{m}</button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:'28px'}}>
                <div style={{fontSize:'13px',fontWeight:'500',marginBottom:'12px',color:'var(--muted)',letterSpacing:'.5px',textTransform:'uppercase'}}>Season</div>
                <div className="ai-moods">
                  {seasons.map(s=>(
                    <button key={s} className={`mood-btn ${season===s?'active':''}`} onClick={()=>setSeason(s===season?'':s)}>{s}</button>
                  ))}
                </div>
              </div>
              <button className="btn btn-primary btn-lg" onClick={getRecs} disabled={!mood||loading} style={{minWidth:'200px'}}>
                {loading?<span className="spinner"/>:'Get My Recommendations →'}
              </button>
            </div>
            <div>
              {loading&&(
                <div className="ai-result-card">
                  <div className="ai-loading">
                    <div className="ai-dot"/><div className="ai-dot"/><div className="ai-dot"/>
                    <span style={{marginLeft:'8px',color:'var(--muted)'}}>Finding your perfect scents...</span>
                  </div>
                </div>
              )}
              {aiDesc&&!loading&&(
                <div className="ai-result-card">
                  <div style={{fontSize:'12px',letterSpacing:'1px',textTransform:'uppercase',color:'var(--gold-dark)',marginBottom:'16px',fontWeight:'500'}}>
                    ✦ AI Recommendations for "{mood}"
                  </div>
                  <div className="ai-response">{aiDesc}</div>
                  {recs.length>0&&(
                    <div style={{marginTop:'24px',display:'flex',flexDirection:'column',gap:'12px'}}>
                      {recs.map(p=>(
                        <div key={p.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',padding:'12px',background:'var(--bg)',borderRadius:'var(--radius-sm)'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                            <div style={{fontSize:'28px'}}>{p.emoji}</div>
                            <div>
                              <div style={{fontWeight:'500',fontSize:'14px'}}>{p.name}</div>
                              <div style={{fontSize:'12px',color:'var(--muted)',fontStyle:'italic'}}>{p.note}</div>
                            </div>
                          </div>
                          <button className="btn btn-primary btn-sm" onClick={()=>onAdd(p,1)} disabled={p.qty===0}>
                            {p.qty===0?'Sold Out':'Add'}

                      ))}
                    </div>
                  )}
                </div>
              )}
              {!aiDesc&&!loading&&(
                <div className="ai-result-card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'280px',gap:'16px'}}>
                  <div style={{fontSize:'48px',opacity:'.3'}}>✦</div>
                  <div style={{color:'var(--muted)',textAlign:'center',fontSize:'15px'}}>Choose a mood to get<br/>personalized recommendations</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  )

// SEND ORDER EMAIL via EmailJS
// ═══════════════════════════════
async function sendOrderEmail(order, form) {
  // EmailJS free tier — sign up at emailjs.com and plug in your IDs
  // Service ID, Template ID, Public Key from your EmailJS dashboard
  const EMAILJS_SERVICE = 'YOUR_SERVICE_ID';
  const EMAILJS_TEMPLATE = 'YOUR_TEMPLATE_ID';
  const EMAILJS_KEY = 'YOUR_PUBLIC_KEY';

  const itemLines = order.items.map(i=>`${i.emoji} ${i.name} x${i.qty} — $${(i.price*i.qty).toFixed(2)}`).join('\n');

  const params = {
    to_email: 'scentifycompany@gmail.com',
    order_id: order.orderId,
    customer_name: form.name,
    customer_email: form.email,
    customer_phone: form.phone || 'Not provided',
    ship_address: form.address,
    ship_city: form.city,
    ship_state: form.state,
    ship_zip: form.zip,
    payment_method: order.payMethod,
    order_items: itemLines,
    order_total: '$' + order.total.toFixed(2),
    order_date: new Date().toLocaleString(),
  };

  try {
    await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, params, EMAILJS_KEY);
    console.log('Order email sent!');
  } catch(e) {
    console.warn('EmailJS not configured yet:', e);
  }
}

function CheckoutModal({open,onClose,cart,onSuccess}){
  const [step,setStep]=useState(1); // 1=details, 2=payment
  const [payMethod,setPayMethod]=useState('');
  const [loading,setLoading]=useState(false);
  const [form,setForm]=useState({name:'',email:'',phone:'',address:'',city:'',state:'',zip:''});
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const update=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const detailsOk=form.name&&form.email&&form.address&&form.city&&form.zip;

  const PAY_METHODS=[
    {id:'applepay', icon:'', label:'Apple Pay', sub:'Touch ID / Face ID', color:'#000'},
    {id:'stripe',   icon:'💳', label:'Card',      sub:'Visa, Mastercard, Amex', color:'#635bff'},
    {id:'venmo',    icon:'💙', label:'Venmo',     sub:'@scentify (add when ready)', color:'#3396cd'},
    {id:'cashapp',  icon:'💚', label:'Cash App',  sub:'$scentify (add when ready)', color:'#00c244'},
    {id:'paypal',   icon:'💛', label:'PayPal',    sub:'paypal.me/scentify (add when ready)', color:'#003087'},
  ];

  const handleConfirm=async()=>{
    setLoading(true);
    try{
      if(payMethod==='stripe'||payMethod==='applepay'){
        // Real Stripe checkout — redirects to Stripe hosted page
        const res=await fetch('https://scentify-ten.vercel.app/api/checkout',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            items:cart,
            email:form.email,
            shipping:{
              name:form.name,
              address:form.address,
              city:form.city,
              state:form.state,
              zip:form.zip,
            }
          })
        });
        const data=await res.json();
        if(data.url){
          // Send order email first, then redirect
          const orderId='SCN-'+Math.random().toString(36).substr(2,8).toUpperCase();
          const order={orderId,email:form.email,total,items:cart,payMethod,form};
          await sendOrderEmail(order,form);
          // Redirect to Stripe
          window.location.href=data.url;
          return;
        }else{
          throw new Error('No checkout URL returned');
        }
      }else{
        // Venmo / Cash App / PayPal — manual payment
        await new Promise(r=>setTimeout(r,1200));
        const orderId='SCN-'+Math.random().toString(36).substr(2,8).toUpperCase();
        const order={orderId,email:form.email,total,items:cart,payMethod,form};
        await sendOrderEmail(order,form);
        setLoading(false);
        onSuccess(order);
      }
    }catch(e){
      console.error('Checkout error:',e);
      setLoading(false);
      alert('Something went wrong. Please try again or use Venmo/Cash App/PayPal.');
    }
  };

  if(!open)return null;

  return(
    <div className="modal-overlay open" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:'600px'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'24px'}}>
          <div>
            <div className="modal-title">{step===1?'Shipping Info':'Choose Payment'}</div>
            <div style={{display:'flex',gap:'8px',marginTop:'6px'}}>
              {[1,2].map(s=>(
                <div key={s} style={{height:'3px',width:'60px',borderRadius:'2px',background:step>=s?'var(--gold)':'var(--border)',transition:'background .3s'}}/>
              ))}
            </div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:'24px',color:'var(--muted)',lineHeight:1}}>×</button>
        </div>

        {/* Order summary always visible */}
        <div className="order-summary" style={{marginBottom:'24px'}}>
          <div className="order-summary-title">Order Summary</div>
          {cart.map(i=>(
            <div key={i.cartId} className="order-line">
              <span>{i.emoji} {i.name} × {i.qty}</span>
              <span>${(i.price*i.qty).toFixed(2)}</span>
            </div>
          ))}

              <div className="form-group"><label>Full Name *</label><input value={form.name} onChange={update('name')} placeholder="Jane Smith"/></div>

                <div style={{fontSize:'12px',color:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>

              <div className="external-pay-box">
                <div style={{fontSize:'13px',color:'var(--muted)',marginBottom:'4px'}}>Pay with</div>
                <div style={{fontSize:'22px',fontWeight:'700',color:'var(--ink)',marginBottom:'8px'}}>🍎 Apple Pay</div>
                <div className="external-pay-amount">${total.toFixed(2)}</div>

              <div className="external-pay-box" style={{background:'linear-gradient(135deg,#e8fdf0,#d0f5df)'}}>
                <div style={{fontSize:'13px',color:'var(--muted)',marginBottom:'4px'}}>Send payment on Cash App to:</div>
                <div className="external-pay-handle" style={{color:'#00c244'}}>$scentify</div>
                <div className="external-pay-amount" style={{color:'#00c244'}}>${total.toFixed(2)}</div>
                <div className="external-pay-note">Add your order number in the Cash App note after placing order. We'll ship once payment clears.</div>
              </div>
            )}

            {/* PayPal */}
            {payMethod==='paypal'&&(
              <div className="external-pay-box" style={{background:'linear-gradient(135deg,#e8edf8,#d0daf5)'}}>
                <div style={{fontSize:'13px',color:'var(--muted)',marginBottom:'4px'}}>Send payment via PayPal to:</div>
                <div className="external-pay-handle" style={{color:'#003087'}}>scentifycompany@gmail.com</div>
                <div className="external-pay-amount" style={{color:'#003087'}}>${total.toFixed(2)}</div>
                <div className="external-pay-note">Select "Friends & Family" to avoid fees. Add your order number in the note.</div>

                    :`Place Order & Pay via ${PAY_METHODS.find(m=>m.id===payMethod)?.label} →`

}

function OrderConfirmation({order,onContinue}){
  const isExternal=['venmo','cashapp','paypal'].includes(order.payMethod);
  const methodLabels={venmo:'Venmo @scentify',cashapp:'Cash App $scentify',paypal:'PayPal to scentifycompany@gmail.com',stripe:'Card (paid)',applepay:'Apple Pay (paid)'};
  return(
    <div className="confirm-page">
      <div className="confirm-icon">{isExternal?'📋':'✦'}</div>
      <div className="confirm-title">{isExternal?'Order Received!':'Order Confirmed!'}</div>
      <p className="confirm-sub">
        {isExternal
          ?`Your order is saved! Complete payment via ${order.payMethod==='venmo'?'Venmo':order.payMethod==='cashapp'?'Cash App':'PayPal'} and we'll ship once it clears.`
          :'Payment confirmed. Your fragrance samples will be packed and shipped within 1-3 business days.'
        }
      </p>
      <div className="confirm-card">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px',marginBottom:'20px'}}>
          <div><div className="confirm-label">Order ID</div><div className="confirm-value">{order.orderId}</div></div>
          <div><div className="confirm-label">Total</div><div className="confirm-value">${order.total.toFixed(2)}</div></div>
        </div>
        <div style={{marginBottom:'16px'}}>
          <div className="confirm-label">Shipping to</div>
          <div style={{fontSize:'14px',color:'var(--ink2)',marginTop:'4px',lineHeight:'1.6'}}>
            {order.form?.name}<br/>{order.form?.address}<br/>{order.form?.city}, {order.form?.state} {order.form?.zip}
          </div>
        </div>
        <div>
          <div className="confirm-label" style={{marginBottom:'10px'}}>Items</div>
          {order.items.map(i=>(
            <div key={i.cartId} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:'14px'}}>
              <span>{i.emoji} {i.name} × {i.qty}</span>
              <span style={{fontWeight:'500'}}>${(i.price*i.qty).toFixed(2)}</span>
            </div>
          ))}
        </div>
      </div>

      {isExternal&&(
        <div className="confirm-steps">
          <div style={{fontSize:'13px',fontWeight:'600',color:'var(--ink)',marginBottom:'4px',letterSpacing:'.5px',textTransform:'uppercase'}}>Next Steps</div>
          <div className="confirm-step">
            <div className="confirm-step-num">1</div>
            <div className="confirm-step-text">
              Send <strong>${order.total.toFixed(2)}</strong> to <strong>{methodLabels[order.payMethod]}</strong>
            </div>
          </div>
          <div className="confirm-step">
            <div className="confirm-step-num">2</div>
            <div className="confirm-step-text">Add your order number <strong>{order.orderId}</strong> in the payment note</div>
          </div>
          <div className="confirm-step">
            <div className="confirm-step-num">3</div>
            <div className="confirm-step-text">We'll confirm your payment and ship your samples within 1-3 business days</div>
          </div>
        </div>
      )}

      <div className="fulfillment-note">
        📦 <strong>Scentify</strong> personally packs every order. A copy of this order was sent to our team.
        Questions? Email <strong>scentifycompany@gmail.com</strong>
      </div>
      <button className="btn btn-primary btn-lg" onClick={onContinue}>Continue Shopping →</button>
    </div>
  )
}

function AdminLogin({onLogin,onBack}){
  const [username,setUsername]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const handleLogin=()=>{
    if(username===ADMIN_USER&&pass===ADMIN_PASS){
      save('scentify_admin_auth',{username,ts:Date.now()});
      onLogin();
    }else setErr('Incorrect username or password.');
  };
  return(
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">Scent<span>ify</span></div>
        <div className="login-sub">Admin Dashboard · Sign in to continue</div>
        <div className="form-group">
          <label>Username</label>
          <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Username"
            onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        </div>
        <div className="form-group">
          <label>Password</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
            onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        </div>
        {err&&<div style={{color:'var(--danger)',fontSize:'13px',marginBottom:'16px'}}>{err}</div>}
        <button className="btn btn-primary" style={{width:'100%'}} onClick={handleLogin}>Sign In →</button>
        <div style={{marginTop:'20px',textAlign:'center'}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'var(--muted)',fontSize:'13px',cursor:'pointer',textDecoration:'underline'}}>
            ← Back to Store
          </button>
        </div>
      </div>
    </div>
  )
}

function ProductForm({item,onSave,onClose,addToast}){
  const [form,setForm]=useState(item||{name:'',category:'Fresh',note:'',price:'',qty:'',emoji:'🌸',desc:'',volume:'2ml',limited:false,popular:false,isNew:false,img:null});
  const [aiLoading,setAiLoading]=useState(false);
  const imgRef=useRef(null);
  const u=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const handleSave=()=>{
    if(!form.name||!form.price||!form.qty){addToast('Please fill required fields','error');return;}
    onSave({...form,id:form.id||Date.now(),price:parseFloat(form.price),qty:parseInt(form.qty)});
  };
  const genDesc=async()=>{
    if(!form.name){addToast('Enter a name first','error');return;}
    setAiLoading(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:150,
          messages:[{role:'user',content:`Write a luxurious, evocative 2-sentence product description for a fragrance sample called "${form.name}" with the scent profile "${form.note}". It's a ${form.volume} sample. Be poetic and sensory. No quotes needed.`}]
        })
      });
      const data=await res.json();
      const text=data.content?.[0]?.text||'';
      setForm(f=>({...f,desc:text}));
      addToast('Description generated!','success');
    }catch{addToast('AI unavailable','error')}
    finally{setAiLoading(false)}
  };
  const handleImg=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>setForm(fr=>({...fr,img:ev.target.result}));
    r.readAsDataURL(f);
  };

  return(
    <div className="admin-modal" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="admin-form-card">
        <div className="admin-form-title">{item?'Edit Sample':'Add New Sample'}</div>
        <div className="form-row">
          <div className="form-group"><label>Name *</label><input value={form.name} onChange={u('name')} placeholder="e.g. Midnight Oud"/></div>
          <div className="form-group">
            <label>Category *</label>
            <select value={form.category} onChange={u('category')}>
              {['Fresh','Sweet','Woody','Summer','Winter'].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group"><label>Scent Profile</label><input value={form.note} onChange={u('note')} placeholder="e.g. Woody · Smoky · Resinous"/></div>
        <div className="form-row">
          <div className="form-group"><label>Price ($) *</label><input type="number" step="0.01" value={form.price} onChange={u('price')}/></div>
          <div className="form-group"><label>Qty Available *</label><input type="number" value={form.qty} onChange={u('qty')}/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label>Volume</label><input value={form.volume} onChange={u('volume')} placeholder="2ml"/></div>
        </div>
        <div className="form-group">
          <label>Emoji Icon</label>
          <div className="emoji-picker">
            {EMOJIS.map(e=>(
              <button key={e} className={`emoji-opt ${form.emoji===e?'selected':''}`} onClick={()=>setForm(f=>({...f,emoji:e}))}>{e}</button>
            ))}
          </div>
        </div>
        <div className="form-group">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
            <label style={{margin:0}}>Description</label>
            <button className="btn btn-ghost btn-sm" onClick={genDesc} disabled={aiLoading}>
              {aiLoading?<span className="spinner"/>:'✦ Generate with AI'}
            </button>
          </div>
          <textarea rows={3} value={form.desc} onChange={u('desc')} placeholder="Describe the scent..."/>
        </div>
        <div className="form-group">
          <label>Product Image</label>
          <div className="img-upload" onClick={()=>imgRef.current.click()}
            style={{cursor:'pointer',position:'relative'}}>
            {form.img
              ?<>
                <img src={form.img} alt="" style={{width:'100%',height:'160px',objectFit:'cover',borderRadius:'8px',display:'block'}}/>
                <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.35)',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s'}}
                  onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>
                  <span style={{color:'#fff',fontSize:'14px',fontWeight:'500'}}>📷 Change Photo</span>
                </div>
              </>
              :<><div className="img-upload-icon">📷</div><div className="img-upload-text">Click to upload photo</div><div style={{fontSize:'12px',color:'var(--muted)',marginTop:'4px'}}>JPG, PNG, WEBP up to 10MB</div></>
            }
          </div>
          <input ref={imgRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImg}/>
          {form.img&&<button className="btn btn-ghost btn-sm" style={{marginTop:'8px'}} onClick={()=>setForm(f=>({...f,img:null}))}>Remove image</button>}
        </div>
        <div style={{display:'flex',gap:'20px',marginBottom:'24px',flexWrap:'wrap'}}>
          {[['limited','Limited Stock'],['popular','Popular'],['isNew','Mark as New']].map(([k,l])=>(
            <label key={k} className="checkbox-row">
              <input type="checkbox" checked={!!form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.checked}))}/>
              <span>{l}</span>
            </label>
          ))}
        </div>
        <div style={{display:'flex',gap:'12px',justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave}>
            {item?'Save Changes':'Add Product'}
          </button>
        </div>
      </div>
    </div>
  )
}

// ADMIN DASHBOARD
// ═══════════════════════════════
function AdminDashboard({products,setProducts,onLogout,addToast}){
  const [tab,setTab]=useState('products');
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [search,setSearch]=useState('');

  const saveProduct=p=>{
    setProducts(prev=>{
      const idx=prev.findIndex(x=>x.id===p.id);
      if(idx>=0){const n=[...prev];n[idx]=p;return n;}
      return[...prev,p];
    });
    addToast(editItem?'Product updated!':'Product added!','success');
    setShowForm(false);setEditItem(null);
  };
  const deleteProduct=id=>{
    if(!confirm('Delete this product?'))return;
    setProducts(prev=>prev.filter(p=>p.id!==id));
    addToast('Product deleted','info');
  };
  const duplicate=p=>{
    const dupe={...p,id:Date.now(),name:p.name+' (Copy)',qty:0};
    setProducts(prev=>[...prev,dupe]);
    addToast('Duplicated!','success');
  };

  const filtered=products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  const outOfStock=products.filter(p=>p.qty===0).length;
  const lowStock=products.filter(p=>p.qty>0&&p.qty<=3).length;
  const totalValue=products.reduce((s,p)=>s+p.price*p.qty,0);

  return(
    <div className="admin-layout">
      <div className="admin-sidebar">
        <div className="admin-logo">Scent<span>ify</span></div>
        <div className="admin-nav">
          {[['products','📦 Products'],['orders','🧾 Orders'],['analytics','📊 Analytics']].map(([k,l])=>(
            <button key={k} className={`admin-nav-item ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>
        <div style={{padding:'24px 16px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
          <button className="admin-nav-item" onClick={onLogout}>🚪 Sign Out</button>
        </div>
      </div>
      <div className="admin-content">
        {tab==='products'&&(
          <>
            <div className="admin-topbar">
              <h1>Products</h1>
              <button className="btn btn-primary" onClick={()=>{setEditItem(null);setShowForm(true)}}>+ Add Sample</button>
            </div>
            <div className="stat-cards">
              <div className="stat-card"><div className="stat-label">Total Products</div><div className="stat-value">{products.length}</div></div>
              <div className="stat-card"><div className="stat-label">Out of Stock</div><div className="stat-value" style={{color:'var(--danger)'}}>{outOfStock}</div></div>
              <div className="stat-card"><div className="stat-label">Low Stock</div><div className="stat-value" style={{color:'#d68910'}}>{lowStock}</div></div>
              <div className="stat-card"><div className="stat-label">Inventory Value</div><div className="stat-value">${totalValue.toFixed(0)}</div></div>
            </div>
            <div style={{marginBottom:'20px'}}>
              <div className="search-bar-container" style={{maxWidth:'360px'}}>
                <svg width="16" height="16" fill="none" stroke="var(--muted)" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input placeholder="Search products..." value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
            </div>
            <table className="admin-table">
              <thead><tr>
                <th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Flags</th><th>Actions</th>
              </tr></thead>
              <tbody>
                {filtered.map(p=>{
                  const sc=p.qty===0?'stock-out':p.qty<=3?'stock-low':'stock-ok';
                  const sl=p.qty===0?'Out of Stock':p.qty<=3?`Low (${p.qty})`:`${p.qty} left`;
                  return(
                    <tr key={p.id}>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                          <div style={{fontSize:'24px'}}>{p.emoji}</div>
                          <div>
                            <div style={{fontWeight:'500',color:'var(--ink)'}}>{p.name}</div>
                            <div style={{fontSize:'12px',color:'var(--muted)',fontStyle:'italic'}}>{p.note}</div>
                          </div>
                        </div>
                      </td>
                      <td>{p.category}</td>
                      <td style={{fontWeight:'500'}}>${p.price.toFixed(2)}</td>
                      <td><span className={`stock-pill ${sc}`}>{sl}</span></td>
                      <td>
                        <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                          {p.limited&&<span className="badge badge-limited">Limited</span>}
                          {p.popular&&<span className="badge badge-popular">Popular</span>}
                          {p.isNew&&<span className="badge badge-new">New</span>}
                        </div>
                      </td>
                      <td>
                        <div className="table-actions">
                          <button className="btn btn-ghost btn-sm" onClick={()=>{setEditItem(p);setShowForm(true)}}>Edit</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>duplicate(p)}>Dupe</button>
                          <button className="btn btn-danger btn-sm" onClick={()=>deleteProduct(p.id)}>Del</button>
                        </div>
                      </td>
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </>
        )}
        {tab==='orders'&&(
          <div>
            <div className="admin-topbar"><h1>Orders</h1></div>
            <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'60px',textAlign:'center'}}>
              <div style={{fontSize:'48px',marginBottom:'16px'}}>🧾</div>
              <div style={{fontSize:'18px',color:'var(--muted)'}}>Connect your backend to view orders</div>
              <div style={{fontSize:'14px',color:'var(--muted)',marginTop:'8px'}}>Orders will appear here when integrated with Stripe + database</div>
            </div>
          </div>
        )}
        {tab==='analytics'&&(
          <div>
            <div className="admin-topbar"><h1>Analytics</h1></div>
            <div className="stat-cards">
              <div className="stat-card"><div className="stat-label">Products</div><div className="stat-value">{products.length}</div><div className="stat-sub">Total SKUs</div></div>
              <div className="stat-card"><div className="stat-label">In Stock</div><div className="stat-value">{products.filter(p=>p.qty>0).length}</div><div className="stat-sub">Available samples</div></div>
              <div className="stat-card"><div className="stat-label">Categories</div><div className="stat-value">5</div><div className="stat-sub">Fresh, Woody, Sweet...</div></div>
              <div className="stat-card"><div className="stat-label">Avg Price</div><div className="stat-value">${(products.reduce((s,p)=>s+p.price,0)/Math.max(products.length,1)).toFixed(2)}</div></div>
            </div>
            <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'40px',textAlign:'center'}}>
              <div style={{fontSize:'48px',marginBottom:'16px'}}>📊</div>
              <div style={{fontSize:'18px',color:'var(--muted)'}}>Full analytics coming soon</div>
            </div>
          </div>
        )}
      </div>
      {showForm&&<ProductForm item={editItem} onSave={saveProduct} onClose={()=>{setShowForm(false);setEditItem(null)}} addToast={addToast}/>}
    </div>
  )
}

// ═══════════════════════════════
// APP ROOT
// ═══════════════════════════════
function App(){
  const [products,setProducts]=useState(()=>load('scentify_products',INITIAL_PRODUCTS));
  const [cart,setCart]=useState(()=>load('scentify_cart',[]));
  const [page,setPage]=useState('store');
  const [cartOpen,setCartOpen]=useState(false);
  const [checkoutOpen,setCheckoutOpen]=useState(false);
  const [confirmedOrder,setConfirmedOrder]=useState(null);
  const [toasts,setToasts]=useState([]);
  const [adminAuthed,setAdminAuthed]=useState(()=>{
    const auth=load('scentify_admin_auth',null);
    if(!auth)return false;
    // Session expires after 24 hours
    if(Date.now()-auth.ts>86400000){save('scentify_admin_auth',null);return false;}
    return true;
  });

  useEffect(()=>save('scentify_products',products),[products]);
  useEffect(()=>save('scentify_cart',cart),[cart]);

  const addToast=(msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  };

  const addToCart=(product,qty=1,bundleScents=null)=>{
    setCart(c=>{
      const existing=c.find(i=>i.cartId===`${product.id}`);
      if(existing&&!bundleScents){
        return c.map(i=>i.cartId===`${product.id}`?{...i,qty:i.qty+qty}:i);
      }
      return[...c,{...product,cartId:bundleScents?`bundle-${Date.now()}`:String(product.id),qty,bundleScents}];
    });
    // Decrement stock
    if(!bundleScents){
      setProducts(p=>p.map(x=>x.id===product.id?{...x,qty:Math.max(0,x.qty-qty)}:x));
    }
    addToast(`${product.name} added to cart!`,'success');
  };

  const updateQty=(cartId,qty)=>{
    if(qty<1){removeItem(cartId);return;}
    setCart(c=>c.map(i=>i.cartId===cartId?{...i,qty}:i));
  };
  const removeItem=cartId=>setCart(c=>c.filter(i=>i.cartId!==cartId));
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  const handleOrderSuccess=(order)=>{
    setConfirmedOrder({...order, items:cart});
    setCart([]);
    setCheckoutOpen(false);
    setCartOpen(false);
    setPage('confirm');
  };

  // Admin page
  if(page==='admin'){
    if(!adminAuthed)return<AdminLogin onLogin={()=>setAdminAuthed(true)} onBack={()=>setPage('store')}/>;
    return<AdminDashboard products={products} setProducts={setProducts} addToast={addToast}
      onLogout={()=>{setAdminAuthed(false);save('scentify_admin_auth',null);setPage('store')}}/>;
  }
  if(page==='confirm'&&confirmedOrder){
    return(
      <>
        <Nav page={page} setPage={setPage} cartCount={0} setCartOpen={setCartOpen}/>
        <OrderConfirmation order={confirmedOrder} onContinue={()=>{setPage('store');setConfirmedOrder(null)}}/>
        <ToastContainer toasts={toasts}/>
      </>
    )
  }

  return(
    <>
      <Nav page={page} setPage={p=>{setPage(p)}} cartCount={cartCount} setCartOpen={setCartOpen}/>
      {page==='store'&&<StorePage products={products} onAdd={addToCart}/>}
      {page==='bundles'&&<BundlesPage products={products} onAdd={addToCart}/>}
      {page==='ai'&&<AIPage products={products} onAdd={addToCart}/>}
      {!['admin','confirm'].includes(page)&&<Footer/>}
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart}
        updateQty={updateQty} removeItem={removeItem} onCheckout={()=>{setCartOpen(false);setCheckoutOpen(true)}}/>
      {checkoutOpen&&<CheckoutModal open={checkoutOpen} onClose={()=>setCheckoutOpen(false)}
        cart={cart} onSuccess={handleOrderSuccess}/>}
      <ToastContainer toasts={toasts}/>
      {/* Admin access button */}
      <div onClick={()=>setPage('admin')} style={{position:'fixed',bottom:'20px',left:'20px',
        fontSize:'12px',color:'var(--muted)',cursor:'pointer',letterSpacing:'1px',userSelect:'none',
        background:'var(--bg2)',border:'1px solid var(--border)',padding:'8px 14px',
        borderRadius:'50px',display:'flex',alignItems:'center',gap:'6px',
        boxShadow:'var(--shadow)',transition:'all .2s',fontFamily:'var(--font-body)',fontWeight:'500'}}
        onMouseEnter={e=>{e.currentTarget.style.color='var(--ink)';e.currentTarget.style.borderColor='var(--ink)'}}
        onMouseLeave={e=>{e.currentTarget.style.color='var(--muted)';e.currentTarget.style.borderColor='var(--border)'}}>
        ⚙ Admin
      </div>
    </>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
